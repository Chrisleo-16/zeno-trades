<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #070a10;
      color: rgba(255,255,255,0.8);
      font-family: 'DM Mono', monospace, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      max-width: 360px;
      width: 90%;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #ef4444;
      margin: 0 auto 24px;
      box-shadow: 0 0 16px rgba(239,68,68,0.4);
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      color: rgba(255,255,255,0.9);
    }
    p {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background: linear-gradient(135deg, #00ff87, #00d4ff);
      color: #070a10;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1>You're offline</h1>
    <p>
      No internet connection detected. Your cached trades are safe.
      Reconnect and refresh to sync.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
